experiment:
  kb_path: data/sample_kb.jsonl
  eval_path: data/sample_eval.jsonl
  output_dir: outputs

llm:
  provider: mock   # mock | openai
  model: gpt-4o
  temperature: 0.2
  max_tokens: 300

kb_grounding:
  backend: tfidf
  retrieve_top_n: 5
  keep_top_k: 3
  selection_mode: selective
  dense_index_dir: ""
  embedding_model: text-embedding-3-small
  embedding_batch_size: 64
  embedding_dimensions: 0
  use_faiss: false
  dense_auto_save: true
  cache_path: ""
  use_cache_only: false
  include_candidate_details: false

search_grounding:
  search_top_n: 5
  keep_top_k: 3
  query_expansion_n: 2
  max_pages: 8
  keep_per_domain: 2
  llm_relevance: true
  llm_relevance_top_m: 8
  selection_mode: selective   # selective | non_selective
  cache_path: ""              # optional jsonl from scripts/freeze_search_cache.py
  use_cache_only: false       # if true, never call web search when cache miss
  include_candidate_details: false
  timeout_sec: 8
  max_retries: 2
  min_chars: 80
  max_page_chars: 5000
  chunk_chars: 900
  overlap_chars: 120
  sleep_min_sec: 0.05
  sleep_max_sec: 0.25
  ignored_domains:
    - facebook.com
    - fb.com
    - x.com
    - twitter.com
    - linkedin.com
    - youtube.com
    - bsky.app
    - bluesky.app
    - vimeo.com
    - instagram.com
