experiment:
  kb_path: data/sample_kb.jsonl
  eval_path: data/benchmark_eval.jsonl
  output_dir: outputs/benchmark_quick

llm:
  provider: mock   # mock | openai
  model: gpt-4o-mini
  temperature: 0.2
  max_tokens: 300

kb_grounding:
  backend: tfidf
  retrieve_top_n: 5
  keep_top_k: 3
  selection_mode: selective
  dense_index_dir: ""
  embedding_model: text-embedding-3-small
  embedding_batch_size: 64
  embedding_dimensions: 0
  use_faiss: false
  dense_auto_save: true
  cache_path: ""
  use_cache_only: false
  include_candidate_details: false

search_grounding:
  search_engine: ddgs          # ddgs | google
  google_region: us
  google_lang: en
  google_safe: off             # off | medium | high
  google_pause_min_sec: 1.0
  google_pause_max_sec: 3.0
  google_process_factor: 3
  search_top_n: 5
  keep_top_k: 3
  query_expansion_n: 2
  max_pages: 8
  keep_per_domain: 2
  llm_relevance: true
  llm_relevance_top_m: 8
  min_evidence_score: 0.0
  timeout_sec: 8
  max_page_chars: 5000
  chunk_chars: 900
  overlap_chars: 120
