experiment:
  kb_path: data/kb_full.jsonl
  eval_path: data/benchmark_eval_large_balanced.jsonl
  output_dir: outputs/search_opt_v1

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 300

kb_grounding:
  backend: tfidf
  retrieve_top_n: 5
  keep_top_k: 3
  selection_mode: selective
  dense_index_dir: ""
  embedding_model: text-embedding-3-small
  embedding_batch_size: 64
  embedding_dimensions: 0
  use_faiss: false
  dense_auto_save: true
  cache_path: ""
  use_cache_only: false
  include_candidate_details: false
  min_evidence_score: 0.0

search_grounding:
  search_engine: ddgs
  google_region: us
  google_lang: en
  google_safe: off
  google_pause_min_sec: 1.0
  google_pause_max_sec: 3.0
  google_process_factor: 3

  search_top_n: 5
  keep_top_k: 3
  query_expansion_n: 3
  max_pages: 6
  keep_per_domain: 2
  llm_relevance: false
  llm_relevance_top_m: 8

  selection_mode: selective
  min_evidence_score: 0.16
  require_choice_overlap: true
  diversify_by_url: true
  domain_priors:
    en.wikipedia.org: 0.03
    britannica.com: 0.02
    brainly.com: -0.08
    quizplus.com: -0.08
    docsity.com: -0.05
    bartleby.com: -0.05
    reddit.com: -0.02

  cache_path: ""
  use_cache_only: false
  include_candidate_details: false
  timeout_sec: 8
  max_retries: 2
  min_chars: 120
  max_page_chars: 4500
  chunk_chars: 900
  overlap_chars: 120
  sleep_min_sec: 0.03
  sleep_max_sec: 0.12
  ignored_domains:
    - facebook.com
    - fb.com
    - x.com
    - twitter.com
    - linkedin.com
    - youtube.com
    - bsky.app
    - bluesky.app
    - vimeo.com
    - instagram.com
