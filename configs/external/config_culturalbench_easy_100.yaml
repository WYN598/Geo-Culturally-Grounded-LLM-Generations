experiment:
  kb_path: data/kb_full.jsonl
  eval_path: data/benchmarks/external/sampled/culturalbench_easy_100.jsonl
  output_dir: outputs/external/culturalbench_easy_100/search_general
llm:
  provider: openai
  model: gpt-5.2
  temperature: 0.0
  max_tokens: 300
kb_grounding:
  backend: tfidf
  retrieve_top_n: 5
  keep_top_k: 3
  selection_mode: selective
  dense_index_dir: ''
  embedding_model: text-embedding-3-small
  embedding_batch_size: 64
  embedding_dimensions: 0
  use_faiss: false
  dense_auto_save: true
  cache_path: ''
  use_cache_only: false
  include_candidate_details: false
  min_evidence_score: 0.0
search_grounding:
  pipeline_variant: general
  search_engine: ddgs
  search_top_n: 5
  keep_top_k: 3
  query_expansion_n: 2
  llm_query_rewrite: true
  enable_query_feedback_retry: false
  query_feedback_max_retry: 0
  query_retry_min_top_score: 0.12
  max_pages: 8
  keep_per_domain: 2
  llm_relevance: false
  llm_relevance_top_m: 6
  embedding_preranker: openai
  embedding_model: text-embedding-3-small
  embedding_preranker_top_m: 36
  embedding_preranker_weight: 0.15
  semantic_reranker: cross_encoder
  semantic_reranker_model: cross-encoder/ms-marco-MiniLM-L-12-v2
  semantic_reranker_top_m: 24
  semantic_reranker_weight: 0.2
  semantic_reranker_device: cuda
  semantic_reranker_batch_size: 32
  diversify_by_url: true
  enable_evidence_organization: true
  enable_evidence_gate: true
  min_evidence_score: 0.16
  summary_max_items: 4
  domain_priors: {}
  cache_path: outputs/external/culturalbench_easy_100/search_cache_general.jsonl
  use_cache_only: false
  include_candidate_details: true
  timeout_sec: 8
  max_retries: 2
  min_chars: 120
  min_snippet_chars: 60
  max_page_chars: 4500
  chunk_chars: 900
  overlap_chars: 120
  sleep_min_sec: 0.03
  sleep_max_sec: 0.12
  ignored_domains:
  - facebook.com
  - fb.com
  - x.com
  - twitter.com
  - linkedin.com
  - youtube.com
  - bsky.app
  - bluesky.app
  - vimeo.com
  - instagram.com
  low_quality_domains:
  - brainly.com
  - classace.io
  - coursehero.com
  - gauthmath.com
  - gauth.com
  - quizlet.com
  - studocu.com
  - bartleby.com
  - answers.com
  - enotes.com
  low_quality_url_keywords:
  - flashcard
  - flash-card
  - homework
  - worksheet
  - multiple-choice
  - quizlet
  - expert-verified
  - answer-key
  - answer/
  - /author/
  - annotated-bib
  - annotated-bibliography


