experiment:
  kb_path: data/sample_kb.jsonl
  eval_path: data/sample_eval.jsonl
  output_dir: outputs/tmp_kb_dense

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 200

kb_grounding:
  backend: dense
  retrieve_top_n: 5
  keep_top_k: 2
  selection_mode: selective
  dense_index_dir: data/kb_dense_index_sample
  embedding_model: text-embedding-3-small
  embedding_batch_size: 16
  embedding_dimensions: 0
  use_faiss: false
  dense_auto_save: true
  cache_path: ""
  use_cache_only: false
  include_candidate_details: false

search_grounding:
  search_top_n: 3
  keep_top_k: 2
  query_expansion_n: 1
  max_pages: 3
  keep_per_domain: 1
  llm_relevance: false
  llm_relevance_top_m: 8
  selection_mode: selective
  cache_path: ""
  use_cache_only: false
  include_candidate_details: false
  timeout_sec: 6
  max_retries: 1
  min_chars: 120
  max_page_chars: 4000
  chunk_chars: 1000
  overlap_chars: 120
  sleep_min_sec: 0.03
  sleep_max_sec: 0.12
  ignored_domains:
    - facebook.com
    - fb.com
