experiment:
  kb_path: data/sample_kb.jsonl
  eval_path: data/benchmark_eval_large.jsonl
  output_dir: outputs/tmp

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 300

kb_grounding:
  backend: tfidf
  retrieve_top_n: 5
  keep_top_k: 3
  selection_mode: selective
  dense_index_dir: ""
  embedding_model: text-embedding-3-small
  embedding_batch_size: 64
  embedding_dimensions: 0
  use_faiss: false
  dense_auto_save: true
  cache_path: ""
  use_cache_only: false
  include_candidate_details: false

search_grounding:
  search_top_n: 5
  keep_top_k: 3
  query_expansion_n: 1
  max_pages: 8
  keep_per_domain: 2
  llm_relevance: false
  llm_relevance_top_m: 8
  selection_mode: selective
  cache_path: ""
  use_cache_only: false
  include_candidate_details: false
  timeout_sec: 8
  max_page_chars: 5000
  chunk_chars: 900
  overlap_chars: 120
