experiment:
  kb_path: data/kb_full.jsonl
  eval_path: data/legacy_100/normad_100.jsonl
  output_dir: outputs/qwen7b_5way_ablation/normad_100/runs/planning_semantic_rag
llm:
  provider: openai
  model: Qwen/Qwen2.5-7B-Instruct
  temperature: 0.0
  max_tokens: 300
kb_grounding:
  backend: tfidf
  retrieve_top_n: 5
  keep_top_k: 3
  selection_mode: selective
  dense_index_dir: ''
  embedding_model: text-embedding-3-small
  embedding_batch_size: 64
  embedding_dimensions: 0
  use_faiss: false
  dense_auto_save: true
  cache_path: ''
  use_cache_only: false
  include_candidate_details: false
  min_evidence_score: 0.0
search_grounding:
  search_pipeline_type: general
  search_engine: ddgs
  search_top_n: 10
  keep_top_k: 3
  query_expansion_n: 2
  llm_query_rewrite: true
  rewrite_policy: auto
  enable_hyde: false
  hyde_query_n: 1
  risk_medium_threshold: 1.5
  risk_high_threshold: 3.5
  bias_query_max_n: 4
  enable_balance_gate: true
  route_bonus_primary: 0.02
  route_bonus_claim_testing: 0.03
  route_bonus_counter_evidence: 0.05
  route_bonus_confounder_context: 0.04
  enable_query_feedback_retry: false
  query_feedback_max_retry: 0
  query_retry_min_top_score: 0.12
  max_pages: 12
  keep_per_domain: 3
  keep_per_root_domain: 4
  llm_relevance: false
  llm_relevance_top_m: 6
  embedding_preranker: openai
  embedding_model: text-embedding-3-small
  embedding_preranker_top_m: 36
  embedding_preranker_weight: 0.15
  semantic_reranker: cross_encoder
  semantic_reranker_model: cross-encoder/ms-marco-MiniLM-L-12-v2
  semantic_reranker_top_m: 24
  semantic_reranker_weight: 0.2
  semantic_reranker_device: cuda
  semantic_reranker_batch_size: 32
  diversify_by_url: true
  enable_evidence_organization: false
  enable_evidence_gate: false
  min_evidence_score: 0.0
  summary_max_items: 4
  domain_priors: {}
  cache_path: outputs/qwen7b_5way_ablation/normad_100/caches/planning.jsonl
  use_cache_only: true
  include_candidate_details: false
  timeout_sec: 8
  search_result_pool_factor: 4
  max_retries: 2
  min_chars: 120
  min_snippet_chars: 60
  max_page_chars: 6500
  chunk_chars: 820
  overlap_chars: 160
  sentence_overlap_sentences: 1
  sleep_min_sec: 0.03
  sleep_max_sec: 0.12
  ignored_domains:
  - facebook.com
  - fb.com
  - x.com
  - twitter.com
  - linkedin.com
  - youtube.com
  - bsky.app
  - bluesky.app
  - vimeo.com
  - instagram.com
  preferred_domains:
  - wikipedia.org
  - britannica.com
  - wikidata.org
  high_quality_domains:
  - bbc.com
  - nationalgeographic.com
  - smithsonianmag.com
  - unesco.org
  - oecd.org
  - pewresearch.org
  preferred_url_keywords:
  - wikipedia
  - britannica
  - official
  - gov
  - edu
  low_quality_domains: []
  low_quality_url_keywords: []
  pipeline_variant: general
